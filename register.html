<!DOCTYPE html>
<html>
<head>
    <title>AnglociHost</title>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" type="text/css" href="css/index.css">
    <link rel="stylesheet" type="text/css" href="icons/css/all.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
</head>
<body>

<div class="login_sec">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-lg-9 col-md-11">
            <div class="login_form">
                  <div class="row justify-content-between gy-4">
                  <div class="col-lg-12">
                      <a href="index.html" class="logo m-auto text-center"><h2>Anglico Host</h2></a>
                      <div class="text-center">
                          <h2>Sign into Your Account</h2>
                     </div>
                      <div class="row mt-4 gy-3">
                        <div class="col-md-6 col-12">
                          <label>Enter name</label>
                          <input class="input-form" type="text" placeholder="Enter name">
                        </div>
                        <div class="col-md-6 col-12">
                          <label>Enter email</label>
                          <input class="input-form" type="text" placeholder="Enter email">
                        </div>
                        <div class="col-md-6 col-12">
                          <label>Company name</label>
                          <input class="input-form" type="password" placeholder="Company name">
                        </div>
                        <div class="col-md-6 col-12">
                          <label>Enter country</label>
                          <input class="input-form" type="text" placeholder="Enter country">
                        </div>
                        <div class="col-md-6 col-12">
                          <label>Enter state</label>
                          <input class="input-form" type="password" placeholder="Enter state">
                        </div>
                        <div class="col-md-6 col-12">
                          <label>Enter address</label>
                          <input class="input-form" type="text" placeholder="Enter address">
                        </div>
                        <div class="col-md-6 col-12">
                          <label>Enter city</label>
                          <input class="input-form" type="password" placeholder="Enter city">
                        </div>
                        <div class="col-md-6 col-12">
                          <label>Enter state</label>
                          <input class="input-form" type="text" placeholder="Enter state">
                        </div>
                        <div class="col-md-6 col-12">
                          <label>Enter zip code</label>
                          <input class="input-form" type="password" placeholder="Enter zip code">
                        </div>
                        <div class="col-md-6 col-12 mb-md-3">
                          <label>Enter password</label>
                          <input class="input-form" type="password" placeholder="Enter Password">
                        </div>
                        <div class="col-12 justify-content-center text-center">
                                <button type="submit" class="btn btn-primary m-auto">Register Now</button>
                                <span class="mt-1 mb-1 d-block text-center">OR</span>

                                <a class="btn btn-primary m-auto fit-content" href="login.html">login Now</a>
                        </div>
                      </div>
                  </div>
                </div>
               </div>
               </div>
          </div>
        </div>
      </div>

<script type="text/javascript" src="js/index.js"></script>
<script src="icons/js/all.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

</body>
</html>
